<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Bacchuu 🥺</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#ffb6c1,#ffd1dc);
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        margin:0;
        text-align:center;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.2);
        max-width:600px;
    }

    button{
        background:#ff4d6d;
        color:white;
        border:none;
        padding:12px 25px;
        font-size:18px;
        border-radius:10px;
        cursor:pointer;
        margin:10px;
    }

    button:hover{
        transform:scale(1.05);
    }

    #message, #sorryBox{
        margin-top:20px;
    }

    #sorryBox{
        max-height:250px;
        overflow-y:auto;
        text-align:left;
        display:none;
        border:2px dashed #ff4d6d;
        padding:10px;
        border-radius:10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🥺 For My Bacchuu 🥺</h1>

    <button onclick="showMessage()">Press Me</button>

    <div id="message"></div>

    <button id="sorryBtn" onclick="showSorrys()" style="display:none;">
        Press Me
    </button>

    <div id="sorryBox"></div>
</div>

<script>
function showMessage(){
    document.getElementById("message").innerHTML =
    `<h3>😭😭</h3>
    <p>
    Im sorryyyy merko yaad tha aapke period cramps aaye hai,
    mujhe lga kaan wali trick se hojayega theek,
    itna pata ni tha 😭<br><br>
    Im sorryyyy bachuuu pls unblock kardoo 😭😭
    </p>`;

    document.getElementById("sorryBtn").style.display = "inline-block";
}

function showSorrys(){
    let text = "";
    for(let i=1;i<=100;i++){
        text += i + ". SORRYYYY BACCHUUU 😭💖<br>";
    }

    document.getElementById("sorryBox").style.display = "block";
    document.getElementById("sorryBox").innerHTML = text;
}
</script>

</body>
</html>
